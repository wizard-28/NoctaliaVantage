name: Publish to noctalia-plugins

on:
  release:
    types: [published]

jobs:
  update-registry:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Clone noctalia-plugins fork
        run: |
          git clone https://x-access-token:${{ secrets.NOCTALIA_PLUGINS_TOKEN }}@github.com/wizard-28/noctalia-plugins.git

      - name: Copy files
        run: |
          set -e
          TARGET="noctalia-plugins/noctalia-vantage"

          rm -rf "${TARGET}"
          mkdir -p "${TARGET}"

          rsync -av --exclude='.git' \
                    --exclude='.github' \
                    --exclude="noctalia-plugins" \
                    --exclude=".gitignore" \
                    --exclude=".qmlls.ini" \
                    ./ "$TARGET/"

      - name: Commit & Push
        run: |
          cd noctalia-plugins

          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR_ID}+${GITHUB_ACTOR}@users.noreply.github.com"

          git add .
          git commit -m "noctalia-vantage: Update to ${{ github.event.release.tag_name }}"

          git push origin main
